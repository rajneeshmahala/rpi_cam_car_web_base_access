<!DOCTYPE html>
<html>
<head>
    <title>Raspberry Pi Car</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
        }

        img {
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            width: 80px;
            height: 60px;
            font-size: 18px;
            margin: 5px;
            border-radius: 10px;
            border: none;
            background: #28a745;
            color: white;
        }

        button:active {
            background: red;
        }
    </style>
</head>
<body>

<h2>🚗 Raspberry Pi WiFi Car</h2>

<img src="/video">

<div class="controls">
    <br>
    <button onclick="send('forward')">↑</button><br>
    <button onclick="send('left')">←</button>
    <button onclick="send('stop')">■</button>
    <button onclick="send('right')">→</button><br>
    <button onclick="send('backward')">↓</button>
</div>

<script>
function send(action) {
    fetch('/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: action})
    });
}
</script>

</body>
</html>
